name: Auto-Async

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    #自动同步：每天早上1点
    - cron:  0 17 * * *

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v2.3.5
        with:
          fetch-depth: 0
      - name: Merge upstream
        run: |
          git config --global user.name 'laosan-xx'
          git config --global user.email 'xxhy1989@gmail.com'
          git remote add upstream https://github.com/VIKINGYFY/CloseWRT-CI.git
          git fetch upstream
          git checkout main

          # 备份本地 CONFIG_TARGET_DEVICE=y 的设备列表（用于特殊文件合并后还原）
          for cfgfile in Config/MT7981.txt Config/MT7986.txt; do
            if [ -f "$cfgfile" ]; then
              grep '^CONFIG_TARGET_DEVICE.*=y$' "$cfgfile" > "${cfgfile}.y_bak" || true
            fi
          done

          # 合并上游，如有冲突则停止并推送TG通知
          if ! git merge --no-commit upstream/main; then
            CONFLICTS="$(git diff --name-only --diff-filter=U)"
            git merge --abort

            MSG="⚠️ Auto-Async 合并冲突%0A仓库: ${{ github.repository }}%0A分支: main%0A冲突文件:%0A$(echo "$CONFLICTS" | sed 's/$/%0A/g')"
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
              --data-urlencode "chat_id=${{ secrets.TG_CHAT_ID }}" \
              --data-urlencode "text=${MSG}" > /dev/null 2>&1

            echo "::error::合并上游出现冲突，已中止并推送TG通知"
            exit 1
          fi

          # 对 MT7981.txt / MT7986.txt 特殊处理：
          # 上游所有 CONFIG_TARGET_DEVICE 默认为 y，只需保留自己之前选定为 y 的设备，其余改为 n
          for cfgfile in Config/MT7981.txt Config/MT7986.txt; do
            if [ -f "${cfgfile}.y_bak" ] && [ -s "${cfgfile}.y_bak" ]; then
              # 先将所有 CONFIG_TARGET_DEVICE=...=y 改为 =n
              sed -i 's|^\(CONFIG_TARGET_DEVICE.*\)=y$|\1=n|' "$cfgfile"
              # 再将之前备份的 y 设备还原为 y
              while IFS= read -r y_line; do
                key=$(echo "$y_line" | sed 's/=y$//')
                if grep -q "^${key}=n$" "$cfgfile"; then
                  sed -i "s|^${key}=n$|${key}=y|" "$cfgfile"
                fi
                # 上游已删除的设备不再保留，直接跳过
              done < "${cfgfile}.y_bak"
              rm -f "${cfgfile}.y_bak"
            fi
          done

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit, skip sync"
          else
            git commit -m "sync: 同步上游配置"
            git push origin main
          fi

  cherry-pick:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        branch: [second, yanglu]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Cherry-pick new commits to ${{ matrix.branch }}
        run: |
          git config --global user.name 'laosan-xx'
          git config --global user.email 'xxhy1989@gmail.com'

          AFTER="${{ github.event.after }}"

          if [[ "$AFTER" =~ ^0+$ ]]; then
            echo "⚠️ 无有效的提交，跳过 cherry-pick"
            exit 0
          fi

          # 切换到目标分支
          git checkout "${{ matrix.branch }}"
          git pull origin "${{ matrix.branch }}"

          # 直接 cherry-pick 当前 push 的提交
          echo "🍒 Cherry-picking: $(git log --oneline -1 $AFTER)"
          if ! git cherry-pick "$AFTER"; then
            echo "❌ Cherry-pick 冲突，中止 ${{ matrix.branch }} 分支的处理"
            git cherry-pick --abort
            exit 1
          fi

          git push origin "${{ matrix.branch }}"
          echo "✅ ${{ matrix.branch }} 分支 cherry-pick 完成"
